name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
        laravel: ["11", "12", "13"]
        include:
          - laravel: "11"
            testbench: "^9.0"
          - laravel: "12"
            testbench: "^10.0"
          - laravel: "13"
            testbench: "^11.0"

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring, openssl
          coverage: pcov

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --with="orchestra/testbench:${{ matrix.testbench }}"

      - name: Run tests
        run: vendor/bin/pest --parallel --coverage --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.5' && matrix.laravel == '13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
